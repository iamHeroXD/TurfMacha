name: Generate Release Keystore (run once)

# ⚠️ RUN THIS ONCE. It creates the signing keystore for Play Store releases.
# After it finishes:
#   1. Download the "release-keystore" artifact from the run.
#   2. Open SECRETS.md inside it and copy the 4 values into
#      GitHub → Settings → Secrets and variables → Actions → New repository secret.
#   3. KEEP the .keystore file safe forever — if you lose it you can NEVER update
#      the app on the Play Store again (you'd have to publish a new listing).

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: "Keystore password (remember this!)"
        required: true
      key_password:
        description: "Key password (can be the same as keystore password)"
        required: true
      key_alias:
        description: "Key alias"
        required: true
        default: "turfmacha"
      validity_days:
        description: "Validity in days"
        required: true
        default: "10000"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore turfmacha-release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 \
            -validity "${{ github.event.inputs.validity_days }}" \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=TurfMacha, OU=Mobile, O=TurfMacha, L=Trivandrum, ST=Kerala, C=IN"

      - name: Encode + build secrets helper
        run: |
          base64 -w0 turfmacha-release.keystore > keystore-base64.txt
          {
            echo "# GitHub Secrets to add (Settings → Secrets and variables → Actions)"
            echo ""
            echo "Add these 4 repository secrets, then run the **Build Release (Play Store)** workflow."
            echo ""
            echo "## RELEASE_KEYSTORE_BASE64"
            echo "(the full contents of keystore-base64.txt in this artifact)"
            echo ""
            echo "## RELEASE_STORE_PASSWORD"
            echo "${{ github.event.inputs.store_password }}"
            echo ""
            echo "## RELEASE_KEY_ALIAS"
            echo "${{ github.event.inputs.key_alias }}"
            echo ""
            echo "## RELEASE_KEY_PASSWORD"
            echo "${{ github.event.inputs.key_password }}"
            echo ""
            echo "## SHA-1 / SHA-256 (add to Google Cloud Android OAuth client for native Google login)"
          } > SECRETS.md
          keytool -list -v -keystore turfmacha-release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -storepass "${{ github.event.inputs.store_password }}" \
            | grep -E "SHA1:|SHA256:" >> SECRETS.md

      - name: Upload keystore + secrets
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            turfmacha-release.keystore
            keystore-base64.txt
            SECRETS.md
          retention-days: 1
          if-no-files-found: error
