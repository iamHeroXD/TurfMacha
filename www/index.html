<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TurfMacha</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #F4F1EB;
        color: #0D4D36;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        padding: 24px;
      }
      .brand { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
      .sub { font-size: 14px; color: #5f5f5f; max-width: 280px; }
      .spinner {
        width: 34px; height: 34px;
        border: 3px solid rgba(13, 77, 54, 0.18);
        border-top-color: #0D4D36;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!--
      This file is only shown as a fallback splash if the hosted server
      (configured in capacitor.config.ts -> server.url) cannot be reached.
      In normal operation the WebView loads the live TurfMacha app directly.
    -->
    <div class="wrap">
      <div class="spinner"></div>
      <div class="brand">TurfMacha</div>
      <div class="sub">Connecting… make sure you have an internet connection.</div>
    </div>
  </body>
</html>
